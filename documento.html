<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documento — EUROVIX WERK OS</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* Documento "Deep Tech Clean" — papel branco, acentos da marca */
:root{ --red:#E63928; --blue:#1E4FA0; --ink:#14181F; --mut:#5A6472; --line:#E2E5EA; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',system-ui,sans-serif;background:#EDEFF2;color:var(--ink);line-height:1.55}
.page{max-width:820px;margin:24px auto;background:#fff;box-shadow:0 10px 40px rgba(10,14,20,.15);padding:46px 52px;border-radius:6px}
.doc-head{display:flex;justify-content:space-between;align-items:start;gap:20px;border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:22px}
.doc-head .wm{font-family:'Montserrat';font-style:italic;font-weight:800;font-size:26px;letter-spacing:.02em}
.doc-head .wm .x{position:relative;display:inline-block}
.doc-head .wm .x::after{content:"";position:absolute;left:-16%;right:-24%;top:52%;height:.09em;background:var(--red);transform:rotate(-38deg)}
.doc-head small{display:block;font-family:'Montserrat';font-size:8px;font-weight:700;letter-spacing:.3em;color:var(--mut);text-transform:uppercase;margin-top:4px}
.doc-head .dtitle{text-align:right}
.doc-head .dtitle b{font-family:'Montserrat';font-size:16px;font-weight:800;display:block;color:var(--red);text-transform:uppercase;letter-spacing:.06em}
.doc-head .dtitle span{font-size:11.5px;color:var(--mut)}
h2{font-family:'Montserrat';font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:22px 0 10px;padding-bottom:6px;border-bottom:1.5px solid var(--line);display:flex;align-items:center;gap:8px}
h2::before{content:"";width:16px;height:3px;background:var(--red)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 26px;font-size:12.5px}
.grid .kv b{font-family:'Montserrat';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);display:block}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
th{font-family:'Montserrat';font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);text-align:left;padding:8px 9px;border-bottom:2px solid var(--ink)}
td{padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:top}
.num{text-align:right;font-variant-numeric:tabular-nums}
.total-row td{font-family:'Montserrat';font-weight:800;font-size:13.5px;border-bottom:none;padding-top:12px}
.total-row .num{color:var(--red)}
.sev{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sev.critico{background:var(--red)}.sev.preventivo{background:#D9A21B}.sev.ok{background:#2E9E5B}
.foot{margin-top:30px;padding-top:14px;border-top:1.5px solid var(--line);font-size:9.5px;color:var(--mut);display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:40px}
.sig{border-top:1.5px solid var(--ink);padding-top:6px;font-size:11px;text-align:center;color:var(--mut)}
.sig img{max-height:52px;display:block;margin:-58px auto 4px}
.stamp{display:inline-block;border:2px solid #2E9E5B;color:#2E9E5B;font-family:'Montserrat';font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;border-radius:6px;transform:rotate(-3deg)}
.muted{color:var(--mut);font-size:11px}
.fotobox{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.fotobox .ph{aspect-ratio:4/3;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#F4F6F8;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--mut);text-align:center;padding:4px}
.fotobox img{width:100%;height:100%;object-fit:cover}
.toolbar{max-width:820px;margin:18px auto 0;display:flex;justify-content:space-between;gap:10px;padding:0 4px}
.toolbar button,.toolbar a{font-family:'Montserrat';font-weight:700;font-size:13px;border:none;border-radius:10px;padding:12px 22px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.print-btn{background:var(--red);color:#fff;box-shadow:0 8px 22px rgba(230,57,40,.35)}
.back-btn{background:#fff;color:var(--ink);border:1px solid #C9CED6!important}
.hash{font-family:monospace;font-size:10px;background:#F4F6F8;border:1px dashed #C9CED6;border-radius:6px;padding:3px 8px}
@media print{
  body{background:#fff}
  .page{box-shadow:none;margin:0;border-radius:0;padding:20px 8px;max-width:none}
  .toolbar{display:none}
}
</style>
</head>
<body>
<div class="toolbar">
  <a class="back-btn" href="javascript:history.back()">← Voltar</a>
  <button class="print-btn" onclick="window.print()">🖨 Imprimir / Salvar PDF</button>
</div>
<div class="page" id="doc">Carregando…</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/werk-data.js"></script>
<script src="assets/js/documento.js"></script>
</body>
</html>
