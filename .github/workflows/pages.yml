# Execução manual: o GITHUB_TOKEN não tem permissão de admin para CRIAR
# o site do Pages (enablement). Depois de habilitar Pages uma vez em
# Settings → Pages → Source: GitHub Actions, rode este workflow — os
# pushes seguintes podem voltar a acioná-lo automaticamente.
name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
